---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: 'Test GitHub Action 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  # Vault JSON is a secret; no access on pull requests
  # Testing can only be performed once code is merged
  push:
    branches: ['main']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: 'Test local GitHub Action'
    runs-on: ubuntu-latest
    # Gate secret access behind a dedicated environment so the 1Password
    # service account token is only reachable from this protected context
    environment: 'development'
    permissions:
      contents: read
    timeout-minutes: 10 # Increase this timeout value as needed
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Perform setup prior to running test(s)
      - name: 'Testing setup step'
        shell: bash
        run: |
          # Testing setup step
          echo "Testing setup step"
          echo "Testing setup step/summary output" >> "$GITHUB_STEP_SUMMARY"

      - name: "Running local action: ${{ github.repository }}"
        id: credential-load
        uses: ./
        with:
          vault_mapping_json: ${{ secrets.VAULT_MAPPING_JSON }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: 'Verify credential exposed via action output'
        shell: bash
        env:
          CREDENTIAL: ${{ steps.credential-load.outputs.credential }}
        run: |
          # Confirm the credential output is populated (default export_env)
          # and matches the known test credential. The expected hash is a
          # fixed constant; the computed hash is never printed.
          if [ -z "${CREDENTIAL}" ]; then
            echo 'Credential not exposed via action output ❌'
            echo 'Credential not exposed via action output ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          EXPECTED='c78aa738682ce8468b3869c035d207e3c7eb8a9f'
          ACTUAL=$(printf '%s' "${CREDENTIAL}" | sha1sum | awk '{print $1}')
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo 'Credential output did not match expected test value ❌'
            echo 'Credential output did not match expected test value ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Output mode test passed ✅' >> "$GITHUB_STEP_SUMMARY"

      - name: 'Confirm credential not leaked into environment'
        shell: bash
        run: |
          # In default mode the action must not export to $GITHUB_ENV, so the
          # inherited CREDENTIAL is read directly and must be empty/unset
          if [ -n "${CREDENTIAL:-}" ]; then
            echo 'Credential unexpectedly present in environment ❌'
            echo 'Credential unexpectedly present in environment ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Environment isolation test passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"

      - name: 'Running local action with export_env enabled'
        id: credential-load-env
        uses: ./
        with:
          vault_mapping_json: ${{ secrets.VAULT_MAPPING_JSON }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          export_env: 'true'

      - name: 'Confirm output empty when exporting to environment'
        shell: bash
        env:
          OUTPUT_CREDENTIAL: ${{ steps.credential-load-env.outputs.credential }}
        run: |
          # With export_env enabled the secret must travel via the environment
          # only; the action output must stay empty to avoid dual exposure
          if [ -n "${OUTPUT_CREDENTIAL}" ]; then
            echo 'Credential unexpectedly exposed via output ❌'
            echo 'Credential unexpectedly exposed via output ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Output suppression test passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"

      - name: 'Verify credential loaded into environment'
        shell: bash
        run: |
          # The action exported the credential to $GITHUB_ENV, so it is read
          # directly from the inherited environment and compared to the known
          # test value. The computed hash is never printed.
          cred="${CREDENTIAL:-}"
          if [ -z "${cred}" ]; then
            echo 'Credential not loaded into environment ❌'
            echo 'Credential not loaded into environment ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          EXPECTED='c78aa738682ce8468b3869c035d207e3c7eb8a9f'
          ACTUAL=$(printf '%s' "${cred}" | sha1sum | awk '{print $1}')
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo 'Env credential did not match expected test value ❌'
            echo 'Env credential did not match expected test value ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Environment export test passed ✅' >> "$GITHUB_STEP_SUMMARY"

      # Exercise the explicit credential_name override path. Passing the
      # repository's own name resolves the same 1Password item, so the
      # override is verified against the same known test credential.
      - name: 'Derive repository name for override test'
        id: repo-name
        shell: bash
        run: |
          # Derive the repository name from GITHUB_REPOSITORY (owner/repo)
          echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      - name: 'Running local action with credential_name override'
        id: credential-load-named
        uses: ./
        with:
          vault_mapping_json: ${{ secrets.VAULT_MAPPING_JSON }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          credential_name: ${{ steps.repo-name.outputs.name }}

      - name: 'Verify credential loaded via credential_name override'
        shell: bash
        env:
          OVERRIDE_CREDENTIAL: >-
            ${{ steps.credential-load-named.outputs.credential }}
        run: |
          # The override names the repository's own item, so the loaded
          # credential must match the known test value. The expected hash
          # is a fixed constant; the computed hash is never printed.
          if [ -z "${OVERRIDE_CREDENTIAL}" ]; then
            echo 'Credential not loaded via credential_name override ❌'
            echo 'Credential not loaded via credential_name override ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          EXPECTED='c78aa738682ce8468b3869c035d207e3c7eb8a9f'
          ACTUAL=$(printf '%s' "${OVERRIDE_CREDENTIAL}" | sha1sum \
            | awk '{print $1}')
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo 'Override credential did not match expected value ❌'
            echo 'Override credential did not match expected value ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'credential_name override test passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"

      # An override naming a DIFFERENT item than the repository's own
      # name must be rejected when no grants allowlist is provided.
      # This fails during path derivation, before any 1Password call.
      - name: 'Running local action with ungranted override'
        id: ungranted-override
        continue-on-error: true
        uses: ./
        with:
          vault_mapping_json: ${{ secrets.VAULT_MAPPING_JSON }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          credential_name: 'some-other-repository'

      - name: 'Verify ungranted override was rejected'
        shell: bash
        env:
          OUTCOME: ${{ steps.ungranted-override.outcome }}
        run: |
          # Failure testing is also important; the previous step MUST fail
          if [ "${OUTCOME}" = 'success' ]; then
            echo 'Ungranted override unexpectedly succeeded ❌'
            echo 'Ungranted override unexpectedly succeeded ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Ungranted override rejection test passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"

      # An override absent from a provided grants allowlist must also
      # be rejected, and malformed allowlists must fail closed
      - name: 'Running local action with non-matching grant'
        id: nonmatching-grant
        continue-on-error: true
        uses: ./
        with:
          vault_mapping_json: ${{ secrets.VAULT_MAPPING_JSON }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          credential_name: 'some-other-repository'
          credential_grants_json: '["a-different-grant"]'

      - name: 'Running local action with malformed grants JSON'
        id: malformed-grants
        continue-on-error: true
        uses: ./
        with:
          vault_mapping_json: ${{ secrets.VAULT_MAPPING_JSON }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          credential_name: 'some-other-repository'
          credential_grants_json: 'not-json'

      - name: 'Verify grant mismatch and malformed grants rejected'
        shell: bash
        env:
          MISMATCH_OUTCOME: ${{ steps.nonmatching-grant.outcome }}
          MALFORMED_OUTCOME: ${{ steps.malformed-grants.outcome }}
        run: |
          # Failure testing is also important; both steps MUST fail
          if [ "${MISMATCH_OUTCOME}" = 'success' ]; then
            echo 'Non-matching grant unexpectedly succeeded ❌'
            echo 'Non-matching grant unexpectedly succeeded ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ "${MALFORMED_OUTCOME}" = 'success' ]; then
            echo 'Malformed grants JSON unexpectedly succeeded ❌'
            echo 'Malformed grants JSON unexpectedly succeeded ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Grants enforcement tests passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"

      # The action accepts the vault mapping base64 encoded (preferred,
      # preserves log redaction). Encode the existing plain JSON secret
      # at runtime so the encoded test exercises identical content, and
      # mask the encoded form so neither representation leaks into logs
      - name: 'Encode vault mapping secret as base64'
        id: encode-mapping
        shell: bash
        env:
          VAULT_MAPPING: ${{ secrets.VAULT_MAPPING_JSON }}
        run: |
          # Base64 encode the vault mapping for the encoded input test
          # (openssl emits a single unwrapped line and is portable
          # across GNU and BSD hosts, matching the README guidance)
          encoded=$(printf '%s' "${VAULT_MAPPING}" | openssl base64 -A)
          echo "::add-mask::${encoded}"
          delimiter="$(openssl rand -hex 16)"
          {
            echo "encoded<<${delimiter}"
            printf '%s\n' "${encoded}"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: 'Running local action with base64 encoded mapping'
        id: base64-mapping
        uses: ./
        with:
          vault_mapping_json: ${{ steps.encode-mapping.outputs.encoded }}
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: 'Verify base64 encoded mapping loaded credential'
        shell: bash
        env:
          CREDENTIAL: ${{ steps.base64-mapping.outputs.credential }}
        run: |
          # The encoded mapping must resolve the same test credential
          if [ -z "${CREDENTIAL}" ]; then
            echo 'Base64 mapping did not expose credential output ❌'
            echo 'Base64 mapping did not expose credential output ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          EXPECTED='c78aa738682ce8468b3869c035d207e3c7eb8a9f'
          ACTUAL=$(printf '%s' "${CREDENTIAL}" | sha1sum | awk '{print $1}')
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo 'Base64 mapping credential mismatch ❌'
            echo 'Base64 mapping credential mismatch ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Base64 encoded mapping test passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"

      # A mapping that is neither base64 encoded JSON nor plain JSON
      # must fail during normalisation, before any 1Password call
      - name: 'Running local action with malformed vault mapping'
        id: malformed-mapping
        continue-on-error: true
        uses: ./
        with:
          vault_mapping_json: 'neither-base64-nor-json!'
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: 'Verify malformed vault mapping was rejected'
        shell: bash
        env:
          OUTCOME: ${{ steps.malformed-mapping.outcome }}
        run: |
          # Failure testing is also important; the previous step MUST fail
          if [ "${OUTCOME}" = 'success' ]; then
            echo 'Malformed vault mapping unexpectedly succeeded ❌'
            echo 'Malformed vault mapping unexpectedly succeeded ❌' \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'Malformed vault mapping rejection test passed ✅' \
            >> "$GITHUB_STEP_SUMMARY"
